server:
  port: 8080
spring:
  application:
    name: whim
  # 开发环境
  profiles:
    active: @profiles_active@
  threads:
    virtual:
      # 是否启用虚拟线程，要求 JDK 21+
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
      enabled: true
# 全局线程池相关配置
thread-pool:
  # 通用异步线程池核心线程数
  core-pool-size: ${THREAD_POOL_CORE_POOL_SIZE:8}
  # 通用异步线程池最大线程数
  max-pool-size: ${THREAD_POOL_MAX_POOL_SIZE:16}
  # 通用异步线程池队列容量
  queue-capacity: 128
  # 非核心线程空闲存活时间，单位：秒
  keep-alive-seconds: 300
  # 通用异步线程名前缀
  thread-name-prefix: whim-whim-async-task-
  # 虚拟线程模式下 @Async 线程名前缀
  virtual-thread-name-prefix: whim-async-virtual-
  # 是否允许核心线程超时回收
  allow-core-thread-timeout: false
  # 定时调度线程池大小
  scheduled-pool-size: ${THREAD_POOL_SCHEDULED_POOL_SIZE:4}
  # 平台线程模式下调度线程名前缀
  scheduled-thread-name-prefix: whim-schedule-pool-
  # 虚拟线程模式下调度线程名前缀
  virtual-scheduled-thread-name-prefix: whim-virtual-schedule-
  # 取消任务时是否及时从调度队列中移除
  remove-on-cancel-policy: true
  # 关闭线程池时是否等待任务执行完成
  wait-for-tasks-to-complete-on-shutdown: true
  # 关闭线程池时最长等待秒数
  await-termination-seconds: 10