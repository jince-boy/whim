server:
  port: 8089

# Actuator 监控端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

spring:
  application:
    name: whim
  # 开发环境
  profiles:
    active: @profiles_active@
  threads:
    virtual:
      # 是否启用虚拟线程，要求 JDK 21+
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:true}
  task:
    execution:
      # Spring Boot 默认应用任务执行器配置
      thread-name-prefix: whim-application-
      shutdown:
        await-termination: true
        await-termination-period: 10s
    scheduling:
      # Spring Boot 默认调度器配置
      thread-name-prefix: whim-scheduling-
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
      enabled: true

# 全局线程池相关配置
thread-pool:
  # 是否启用计算任务执行器，设为 false 可直接关闭
  enabled: false
  # 通用异步线程名前缀
  thread-name-prefix: whim-async-task-
  # 通用异步线程池核心线程数
  core-pool-size: ${THREAD_POOL_CORE_POOL_SIZE:8}
  # 通用异步线程池最大线程数
  max-pool-size: ${THREAD_POOL_MAX_POOL_SIZE:16}
  # 通用异步线程池队列容量
  queue-capacity: 128
  # 非核心线程空闲存活时间，单位：秒
  keep-alive-seconds: 300
  # 是否允许核心线程超时回收
  allow-core-thread-timeout: false
  # 关闭线程池时是否等待任务执行完成
  wait-for-tasks-to-complete-on-shutdown: true
  # 关闭线程池时最长等待秒数
  await-termination-seconds: 10