server:
  port: 8089
whim:
  task:
      # 是否启用计算任务执行器，设为 false 可直接关闭
      enabled: ${WHIM_TASK_ENABLED:false}
      # 平台线程数，建议按部署机器 CPU 核心数配置
      pool-size: ${WHIM_TASK_POOL_SIZE:8}
      # 阻塞队列容量；生产速度高于消费速度时任务会先进入队列
      queue-capacity: ${WHIM_TASK_QUEUE_CAPACITY:200}
      # 平台线程名前缀，便于日志和问题排查
      thread-name-prefix: ${WHIM_TASK_THREAD_NAME_PREFIX:whim-compute-}
      # 应用关闭时是否等待已提交任务执行完成
      await-termination: ${WHIM_TASK_AWAIT_TERMINATION:true}
      # 应用关闭时的最长等待时间
      await-termination-period: ${WHIM_TASK_AWAIT_TERMINATION_PERIOD:10s}
spring:
  application:
    name: whim
  # 开发环境
  profiles:
    active: @profiles_active@
  threads:
    virtual:
      # 是否启用虚拟线程，要求 JDK 21+
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:true}
  task:
    execution:
      # Spring Boot 默认应用任务执行器配置
      thread-name-prefix: whim-application-
      shutdown:
        await-termination: true
        await-termination-period: 10s
    scheduling:
      # Spring Boot 默认调度器配置
      thread-name-prefix: whim-scheduling-
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
      enabled: true