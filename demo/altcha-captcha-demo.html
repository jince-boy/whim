<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALTCHA Captcha Demo</title>
    <script async defer src="https://cdn.jsdelivr.net/gh/altcha-org/altcha/dist/altcha.min.js" type="module"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f6f7f9;
            color: #1f2937;
            font-family: Arial, "Microsoft YaHei", sans-serif;
        }

        main {
            width: min(920px, calc(100vw - 32px));
            margin: 40px auto;
            display: grid;
            gap: 20px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }

        section {
            display: grid;
            gap: 14px;
            padding: 20px;
            border: 1px solid #d8dee8;
            border-radius: 8px;
            background: #ffffff;
        }

        label {
            display: grid;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid #c6ceda;
            border-radius: 6px;
            padding: 10px 12px;
            color: #111827;
            font: 14px/1.5 Consolas, "Microsoft YaHei", monospace;
            background: #ffffff;
        }

        textarea {
            min-height: 180px;
            resize: vertical;
        }

        button {
            justify-self: start;
            border: 1px solid #1f2937;
            border-radius: 6px;
            padding: 9px 14px;
            color: #ffffff;
            background: #1f2937;
            cursor: pointer;
            font-size: 14px;
        }

        button.secondary {
            color: #1f2937;
            background: #ffffff;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .state {
            min-height: 40px;
            border-radius: 6px;
            padding: 10px 12px;
            background: #eef2f7;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<main>
    <h1>ALTCHA 验证码 Demo</h1>

    <section>
        <label>
            验证码接口
            <input id="challengeUrl" value="http://localhost:8089/system/auth/captcha">
        </label>
        <div class="actions">
            <button id="reloadWidget" type="button">重新加载验证码</button>
            <button id="copyPayload" class="secondary" type="button">复制 altcha payload</button>
        </div>
        <form id="captchaForm">
            <div id="widgetHost"></div>
        </form>
        <div id="state" class="state">等待验证码组件加载</div>
    </section>

    <section>
        <label>
            Apifox 登录参数 altcha
            <textarea id="payload" readonly></textarea>
        </label>
    </section>
</main>

<script type="module">
    const challengeUrl = document.querySelector('#challengeUrl');
    const widgetHost = document.querySelector('#widgetHost');
    const captchaForm = document.querySelector('#captchaForm');
    const state = document.querySelector('#state');
    const payload = document.querySelector('#payload');
    const reloadWidget = document.querySelector('#reloadWidget');
    const copyPayload = document.querySelector('#copyPayload');
    let challengeObjectUrl;

    function readPayload() {
        const input = captchaForm.querySelector('input[name="altcha"]');
        payload.value = input?.value || '';
    }

    function resolveChallengeData(responseBody) {
        return responseBody && responseBody.data ? responseBody.data : responseBody;
    }

    async function loadChallenge() {
        const response = await fetch(challengeUrl.value.trim(), {
            headers: {
                Accept: 'application/json'
            }
        });
        if (!response.ok) {
            throw new Error(`验证码接口请求失败：${response.status}`);
        }
        const responseBody = await response.json();
        const challenge = resolveChallengeData(responseBody);
        if (!challenge || !challenge.algorithm || !challenge.challenge || !challenge.salt || !challenge.signature) {
            throw new Error('验证码接口响应格式不正确');
        }
        return challenge;
    }

    function bindWidget(widget) {
        widget.addEventListener('statechange', (event) => {
            state.textContent = `当前状态：${event.detail.state}`;
            if (event.detail.state === 'verified') {
                window.setTimeout(readPayload, 50);
            }
        });
        widget.addEventListener('verified', () => window.setTimeout(readPayload, 50));
    }

    async function rebuildWidget() {
        payload.value = '';
        state.textContent = '正在请求验证码';
        widgetHost.replaceChildren();
        if (challengeObjectUrl) {
            URL.revokeObjectURL(challengeObjectUrl);
            challengeObjectUrl = undefined;
        }
        try {
            await customElements.whenDefined('altcha-widget');
            const challenge = await loadChallenge();
            challengeObjectUrl = URL.createObjectURL(new Blob([JSON.stringify(challenge)], {
                type: 'application/json'
            }));
            const widget = document.createElement('altcha-widget');
            widget.setAttribute('name', 'altcha');
            widget.setAttribute('auto', 'onload');
            widget.setAttribute('challengeurl', challengeObjectUrl);
            widgetHost.append(widget);
            bindWidget(widget);
            state.textContent = '验证码已加载';
        } catch (error) {
            state.textContent = error.message;
        }
    }

    window.addEventListener('load', () => {
        if (!window.isSecureContext) {
            state.textContent = '当前页面不是安全上下文，浏览器可能无法计算验证码';
        }
        rebuildWidget();
    });

    reloadWidget.addEventListener('click', rebuildWidget);
    copyPayload.addEventListener('click', async () => {
        readPayload();
        if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(payload.value);
            state.textContent = 'altcha payload 已复制';
            return;
        }
        payload.focus();
        payload.select();
        state.textContent = '已选中 altcha payload';
    });
</script>
</body>
</html>
